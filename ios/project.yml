name: ESLLearningAssistant
options:
  bundleIdPrefix: com.akiraak.esllearningassistant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: N38G4DGA67
    CODE_SIGN_STYLE: Automatic

targets:
  ESLLearningAssistant:
    type: application
    platform: iOS
    sources:
      - path: ESLLearningAssistant/Sources
      - path: ESLLearningAssistant/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant
        ASSETSCATALOG_COMPILER_APPICON_NAME: AppIcon
        # シミュレータ/通常ビルドの既定値。実機向けは run-ios-device.sh がMacのIPで上書きする。
        BACKEND_BASE_URL: http://localhost:8801
    info:
      path: ESLLearningAssistant/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: 教科書ページを撮影してOCR・翻訳するためにカメラを使用します。
        # ローカル開発用バックエンド（HTTP/非TLS）に接続するため。クラウド化する際に見直す。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        BackendBaseURL: $(BACKEND_BASE_URL)

  ESLLearningAssistantTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ESLLearningAssistantTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ESLLearningAssistant

  ESLLearningAssistantUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ESLLearningAssistantUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ESLLearningAssistant

schemes:
  ESLLearningAssistant:
    build:
      targets:
        ESLLearningAssistant: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ESLLearningAssistantTests
        - ESLLearningAssistantUITests
