name: ESLLearningAssistant
options:
  bundleIdPrefix: com.akiraak.esllearningassistant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: N38G4DGA67
    CODE_SIGN_STYLE: Automatic

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1

targets:
  ESLLearningAssistant:
    type: application
    platform: iOS
    sources:
      - path: ESLLearningAssistant/Sources
      - path: ESLLearningAssistant/Resources
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 既定は本番。ローカル開発の実機向けは run-ios-device.sh がMacのIPで上書きする。
        BACKEND_BASE_URL: https://esl.chobi.me
        # /api/* 認証用 secret。既定は空（アプリのSettings画面で入力）。
        # run-ios-device.sh が backend/.env の API_SECRET を注入する。
        BACKEND_API_SECRET: ""
    info:
      path: ESLLearningAssistant/Resources/Info.plist
      properties:
        CFBundleDisplayName: ESL Assistant
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: 教科書ページを撮影してOCR・翻訳するためにカメラを使用します。
        # ローカル開発用バックエンド（HTTP/非TLS）に接続するため。クラウド化する際に見直す。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        BackendBaseURL: $(BACKEND_BASE_URL)
        BackendAPISecret: $(BACKEND_API_SECRET)

  ESLLearningAssistantTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ESLLearningAssistantTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ESLLearningAssistant

  ESLLearningAssistantUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ESLLearningAssistantUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akiraak.esllearningassistant.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ESLLearningAssistant

schemes:
  ESLLearningAssistant:
    build:
      targets:
        ESLLearningAssistant: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ESLLearningAssistantTests
        - ESLLearningAssistantUITests
